services:
  postgres:
    image: postgres:15-alpine
    container_name: teamflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
      POSTGRES_DB: teamflow
    ports:
      - '35432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teamflow']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamflow_redis
    restart: unless-stopped
    ports:
      - '36379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: teamflow_redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '35540:5540'

  mailpit:
    image: axllent/mailpit:latest
    container_name: teamflow_mailpit
    restart: unless-stopped
    ports:
      - '31125:1025'
      - '38025:8025'

volumes:
  postgres_data:
  redis_data:
